<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليلة لالة ستي - SHIELD DZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #7cb342;
            --accent: #ffd700;
            --bg: #050a14;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at top, #1e293b, var(--bg));
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            z-index: 2;
        }

        header h1 { font-weight: 900; font-size: 2rem; margin-bottom: 10px; color: var(--accent); text-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }
        header p { color: #cbd5e1; margin-bottom: 30px; line-height: 1.6; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        input, textarea {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: 'Tajawal';
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--primary); }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #2e7d32, #7cb342);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(124, 179, 66, 0.3); }

        /* Admin Section */
        #adminSection { display: none; margin-top: 50px; width: 100%; max-width: 800px; }
        .admin-table { width: 100%; border-collapse: collapse; background: var(--glass); border-radius: 15px; overflow: hidden; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 15px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .admin-table th { background: rgba(124, 179, 66, 0.2); color: var(--primary); }

        .btn-admin-access { background: transparent; border: 1px solid rgba(255,255,255,0.2); font-size: 0.8rem; margin-top: 40px; width: auto; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="container" id="guestView">
        <header>
            <h1>سهرة لالة ستي 🌙</h1>
            <p>بصفتك ضيفاً مميزاً في ملتقى SHIELD DZ، ما هو النشاط الترفيهي الذي تود مشاركتنا به في ليلتنا الأخيرة؟</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label>الاسم</label>
                <input type="text" id="guestFName" placeholder="اسمه الأول">
            </div>
            <div class="input-group">
                <label>اللقب</label>
                <input type="text" id="guestLName" placeholder="لقبه">
            </div>
            <div class="input-group">
                <label>النشاط المقترح</label>
                <textarea id="activityDesc" rows="3" placeholder="مثلاً: إلقاء شعر، مسابقة ثقافية، عرض مسرحي..."></textarea>
            </div>
            <button onclick="submitActivity()">تأكيد المشاركة في السهرة ✨</button>
        </div>

        <button class="btn-admin-access" onclick="accessAdmin()">لوحة تحكم المنظمين 🔑</button>
    </div>

    <div id="adminSection">
        <h2 style="color: var(--accent); text-align: center;">قائمة أنشطة السهرة (إدارة طموح)</h2>
        <div style="overflow-x: auto;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>الاسم واللقب</th>
                        <th>النشاط</th>
                        <th>التوقيت</th>
                    </tr>
                </thead>
                <tbody id="activitiesList">
                    </tbody>
            </table>
        </div>
        <button onclick="window.location.reload()" style="background: #1e293b; margin-top: 20px;">خروج من الإدارة</button>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyCgZgpQHl1aJcbtIe8otscDfA_Plzl7n_c", 
            authDomain: "test-b8f87.firebaseapp.com", 
            databaseURL: "https://test-b8f87-default-rtdb.firebaseio.com", 
            projectId: "test-b8f87", 
            storageBucket: "test-b8f87.firebasestorage.app", 
            messagingSenderId: "199270761575", 
            appId: "1:199270761575:web:fdb307007a678a498680c2" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // وظيفة تسجيل النشاط
        function submitActivity() {
            const fName = document.getElementById('guestFName').value.trim();
            const lName = document.getElementById('guestLName').value.trim();
            const activity = document.getElementById('activityDesc').value.trim();

            if(!fName || !lName || !activity) return alert("الرجاء ملء كل الخانات!");

            const activityId = Date.now();
            db.ref('shield_night/' + activityId).set({
                fullName: fName + " " + lName,
                activity: activity,
                time: new Date().toLocaleTimeString('ar-DZ')
            }).then(() => {
                alert("شكراً لك! تم تسجيل نشاطك بنجاح. ننتظرك في السهرة!");
                location.reload();
            });
        }

        // وظيفة الدخول للإدارة
        function accessAdmin() {
            const pass = prompt("أدخل كلمة السر للدخول (فريق طموح):");
            if(pass === "2026") {
                document.getElementById('guestView').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                loadActivities();
            } else {
                alert("عذراً، كلمة السر خاطئة!");
            }
        }

        // تحميل الأنشطة من قاعدة البيانات
        function loadActivities() {
            db.ref('shield_night').on('value', (snapshot) => {
                const list = document.getElementById('activitiesList');
                list.innerHTML = "";
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    list.innerHTML += `
                        <tr>
                            <td>${data.fullName}</td>
                            <td>${data.activity}</td>
                            <td style="font-size: 0.8rem; color: #94a3b8;">${data.time}</td>
                        </tr>
                    `;
                });
            });
        }
    </script>
</body>
</html>
